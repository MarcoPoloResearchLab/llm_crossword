# Frontend auth config for the browser. The app loads this file directly.

environments:
  - description: "Local development"
    origins:
      - "http://localhost:8000"
    auth:
      tauthUrl: "http://localhost:8000"
      googleClientId: "7962005714-9g4tnvhr0ciml0dt2i5e9pagpcdatpde.apps.googleusercontent.com"
      tenantId: "crossword"
      loginPath: "/auth/google"
      logoutPath: "/auth/logout"
      noncePath: "/auth/nonce"
    authButton:
      text: "signin_with"
      size: "large"
      theme: "outline"
      shape: "circle"

  - description: "Production"
    origins:
      - "https://llm-crossword.mprlab.com"
    auth:
      tauthUrl: "https://tauth.mprlab.com"
      googleClientId: "7962005714-9g4tnvhr0ciml0dt2i5e9pagpcdatpde.apps.googleusercontent.com"
      tenantId: "crossword"
      loginPath: "/auth/google"
      logoutPath: "/auth/logout"
      noncePath: "/auth/nonce"
    authButton:
      text: "signin_with"
      size: "large"
      theme: "outline"
      shape: "circle"
